<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<title>feudalism is so out</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --n:   #0a1464;
  --w:   #21918c;
  --n40: rgba(10,20,100,.40);
  --n20: rgba(10,20,100,.20);
  --n08: rgba(10,20,100,.08);
  --r: #440154; --y: #fde725; --l: #9a8d7a;
  --f: 'Inter', system-ui, sans-serif;
}

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--f); background: #fff; color: var(--n); font-size: 13px; -webkit-font-smoothing: antialiased; }

/* ── Header ── */
header {
  position: sticky; top: 0; z-index: 20;
  background: #fff; border-bottom: 1px solid var(--n20);
  padding: 14px 24px 0;
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap; overflow: hidden;
}
h1 { font-size: 20px; font-weight: 800; letter-spacing: .02em; flex: 1; padding-bottom: 12px; }
#wclock { font-size: 15px; font-weight: 600; font-variant-numeric: tabular-nums; color: var(--n40); padding-bottom: 12px; }
.hbtns { display: flex; gap: 6px; padding-bottom: 12px; }
.hbtns button {
  padding: 4px 12px; border: 1px solid var(--n20); border-radius: 999px;
  background: #fff; color: var(--n); font: 600 11px var(--f);
  letter-spacing: .03em; cursor: pointer; transition: all .12s;
}
.hbtns button:hover { border-color: var(--n); background: var(--n); color: #fff; }
#cbar { flex-basis: 100%; height: 2px; display: flex; margin: 0 -24px; }
.cs { flex: 1; background: var(--n08); transition: background .2s; }
.cs.w { background: var(--w); } .cs.r { background: var(--r); }
.cs.y { background: var(--y); box-shadow: inset 0 0 0 1px rgba(0,0,0,.12); }
.cs.l { background: var(--l); }

/* ── Banner ── */
#bnr { display: none; align-items: center; gap: 8px; padding: 8px 18px; background: #f0f2ff; border-bottom: 1px solid var(--n08); font-size: 11px; font-weight: 600; transition: opacity .7s ease; }
#bnr.on { display: flex; }
#bnr.fading { opacity: 0; }
#bnr.narrator { background: transparent; border-bottom-color: var(--n08); }
#bnr.narrator #bmsg { font-style: italic; font-weight: 400; font-size: 10.5px; color: var(--n); letter-spacing: .01em; }
#bnr.narrator #xbtn { display: none; }
#bmsg { flex: 1; }
#xbtn { background: none; border: none; cursor: pointer; font-size: 16px; color: var(--n40); font-family: var(--f); line-height: 1; }
#xbtn:hover { color: var(--n); }

/* ── Page layout ── */
.page { display: flex; align-items: flex-start; max-width: 1080px; margin: 0 auto; }
#content { flex: 1; min-width: 0; }
#day { padding: 16px 24px 60px; }

/* ── Sidebar ── */
#sidebar { width: 136px; flex-shrink: 0; position: sticky; top: 58px; padding: 22px 16px 20px 24px; align-self: flex-start; }
.leg-title { font-size: 9px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--n40); padding-bottom: 10px; }
.leg-item { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 500; padding: 3px 0; }
.sb-today { margin-top: 16px; }
.sb-row { display: flex; align-items: center; gap: 7px; padding: 2px 0; }
.sb-lbl { flex: 1; font-size: 11px; font-weight: 500; }
.sb-val { font-size: 11px; font-weight: 400; color: var(--n40); font-variant-numeric: tabular-nums; }
.leg-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; font-size: 6px; font-weight: 800; color: #fff; }
.leg-dot.w { background: var(--w); } .leg-dot.r { background: var(--r); } .leg-dot.y { background: var(--y); color: rgba(0,0,0,.6); } .leg-dot.l { background: var(--l); }

/* ── Block headers ── */
.bh { font-size: 9px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--n40); padding: 22px 0 6px; }
.bh:first-child { padding-top: 4px; }
.bh.ph { color: #bbb; }

/* ── Card ── */
.wb {
  display: flex; align-items: stretch;
  border: 1px solid var(--n20); border-radius: 8px;
  background: #f6f6f6; margin-bottom: 7px;
  transition: border-color .2s, box-shadow .2s;
}
.wb[data-type=buffer] { background: #fff; border-color: #d8d8d8; }
.wb[data-type=pause]  { background: #fff; border-color: #d8d8d8; }
.wb[data-type=buffer] .wbt, .wb[data-type=buffer] .wbt-sub,
.wb[data-type=buffer] .wa,  .wb[data-type=buffer] .wb-entry-line, .wb[data-type=buffer] input.wi,
.wb[data-type=pause]  .wbt, .wb[data-type=pause]  .wa,
.wb[data-type=pause]  .wb-entry-line, .wb[data-type=pause]  input.wi { color: #bbb; }
.wb[data-type=buffer] input.wi::placeholder,
.wb[data-type=pause]  input.wi::placeholder { color: rgba(0,0,0,.18); }
.wb[data-type=buffer] .pill, .wb[data-type=pause] .pill { border-color: #d0d0d0; color: #bbb; }
.wb[data-type=buffer] .pill[data-s=running],
.wb[data-type=pause]  .pill[data-s=running] { background: #bbb; border-color: #bbb; color: #fff; animation: none; }
.wb.act { border-color: var(--n); box-shadow: 0 0 0 3px var(--n08); }


/* ── Left: time + pills ── */
.wbl { display: flex; align-items: center; gap: 10px; padding: 6px 12px; flex-shrink: 0; }

.wbt-wrap { display: flex; flex-direction: column; flex-shrink: 0; min-width: 50px; }
.wbt { font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: .01em; line-height: 1; }
.wbt-sub { font-size: 9px; font-weight: 500; letter-spacing: .1em; color: var(--n); margin-top: 2px; }

/* Entry colour circles (ef-check = clickable in sub-card, wb-mark = display in main card) */
.ef-check { width: 13px; height: 13px; border-radius: 50%; border: 1.5px solid var(--n20); background: none; cursor: pointer; flex-shrink: 0; padding: 0; transition: all .15s; display: inline-flex; align-items: center; justify-content: center; font-size: 6.5px; font-weight: 800; color: #fff; }
.ef-check:hover { border-color: var(--n); }
.ef-check[data-col=w] { background: var(--w); border: none; }
.ef-check[data-col=r] { background: var(--r); border: none; }
.ef-check[data-col=y] { background: var(--y); border: none; color: rgba(0,0,0,.6); }
.ef-check[data-col=l] { background: var(--l); border: none; }
.wb-mark { display: inline-flex; align-items: center; justify-content: center; width: 9px; height: 9px; border-radius: 50%; background: var(--n08); margin-right: 5px; flex-shrink: 0; font-size: 5.5px; font-weight: 800; color: #fff; }
.wb-mark[data-col=w] { background: var(--w); }
.leg-dot.w, .ef-check[data-col=w], .wb-mark[data-col=w],
#fo-form .ef-check[data-col=w] { outline: 1px solid rgba(33,145,140,.35); outline-offset: 1px; }

.wb-mark[data-col=r] { background: var(--r); }
.wb-mark[data-col=y] { background: var(--y); color: rgba(0,0,0,.6); }
.wb-mark[data-col=l] { background: var(--l); }

/* Pills — both white, turn navy when running, back to white when paused */
.pill {
  width: 68px; height: 28px;
  border: 0.75px solid var(--n); border-radius: 999px;
  background: #fff; color: var(--n);
  font: 700 12px/1 var(--f); font-variant-numeric: tabular-nums; letter-spacing: .02em;
  cursor: pointer; flex-shrink: 0;
  display: inline-flex; align-items: center; justify-content: center;
  transition: background .15s, color .15s; white-space: nowrap; overflow: hidden;
}
.pill:not([data-s=done]):hover { background: var(--n08); }
.pill[data-s=running] { background: var(--n); color: #fff; animation: breathe 2.5s ease-in-out infinite; }
.pill[data-s=paused]  { background: #fff; color: var(--n); animation: none; }
.pill[data-s=done]    { opacity: .18; pointer-events: none; animation: none; }
.pill[data-warn=true] { background: var(--r); border-color: var(--r); color: #fff; animation: none; }

.pill[data-s=pending] { background: var(--n); color: #fff; animation: pending-pulse .5s ease-in-out; }
@keyframes pending-pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }

@keyframes breathe { 0%,100% { opacity: 1; } 50% { opacity: .72; } }

/* ── Right: elapsed + entry lines + plus button ── */
.wbr { display: flex; align-items: center; flex: 1; padding: 5px 12px; min-width: 0; gap: 10px; }
.wa  { width: 52px; flex-shrink: 0; font-size: 12px; font-weight: 700; font-variant-numeric: tabular-nums; white-space: nowrap; }
.wb-entries { flex: 1; min-width: 0; }
.wb-entry-line { font-size: 11px; padding: 1px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.wb-plus { background: none; border: none; cursor: pointer; font-size: 18px; font-weight: 300; color: var(--n20); padding: 0 2px; line-height: 1; flex-shrink: 0; transition: color .12s; }
.wb-plus:hover { color: var(--n); }

/* ── Entry sub-card ── */
.wb-form { display: none; background: #f0f0f0; border: 1px solid var(--n20); border-radius: 0 0 8px 8px; border-top: none; margin: -7px 0 7px; padding: 8px 14px 10px; }
.wb-form.open { display: block; }
.ef-list { margin-bottom: 6px; }
.ef-entry-item { display: flex; align-items: center; gap: 8px; padding: 2px 0; font-size: 11px; border-bottom: 1px solid var(--n08); }
.ef-entry-item span { flex: 1; }
.ef-del { background: none; border: none; cursor: pointer; font-size: 13px; color: var(--n20); padding: 0 2px; line-height: 1; }
.ef-del:hover { color: var(--r); }
.ef-row { display: flex; align-items: center; gap: 8px; }
input.ef-est { width: 52px; flex: none; font-variant-numeric: tabular-nums; }
input.ef-client { flex: 2; }
input.ef-notes  { flex: 3; }
input.wi {
  border: none; background: transparent;
  font-family: var(--f); color: var(--n); font-size: 12px;
  padding: 2px 4px; border-radius: 3px; min-width: 0;
}
input.wi:focus { outline: 1.5px solid var(--n); background: #fff; }
input.wi::placeholder { color: rgba(10,20,100,.28); }
.ef-add { padding: 2px 10px; border: 1px solid var(--n20); border-radius: 999px; background: #fff; color: var(--n); font: 600 11px var(--f); cursor: pointer; flex-shrink: 0; transition: all .1s; }
.ef-add:hover { border-color: var(--n); background: var(--n); color: #fff; }



/* ── Summary ── */
#sum { display: none; padding: 0 24px 60px; }
#sum.on { display: block; }
.si { border-top: 1px solid var(--n20); padding-top: 20px; }
#sum h2 { font-size: 9px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--n40); margin-bottom: 14px; }
.sr { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--n08); }
.sd { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; background: var(--n08); }
.sd.w { background: var(--w); } .sd.r { background: var(--r); }
.sd.y { background: var(--y); box-shadow: inset 0 0 0 1px rgba(0,0,0,.15); }
.sd.l { background: var(--l); }
.sl { flex: 1; font-size: 13px; } .st { color: var(--n40); font-size: 12px; font-variant-numeric: tabular-nums; }
.sbh { padding: 14px 0 4px; font-size: 9px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--n40); }
.sbtns { display: flex; gap: 8px; margin-top: 18px; flex-wrap: wrap; }
.sbtns button {
  padding: 5px 14px; border: 1px solid var(--n20); border-radius: 999px;
  background: #fff; color: var(--n); font: 600 11px var(--f);
  letter-spacing: .04em; cursor: pointer; transition: all .12s;
}
.sbtns button:hover { border-color: var(--n); background: var(--n); color: #fff; }

/* ── Focus overlay ── */
#fo {
  display: none; position: fixed; inset: 0; z-index: 200;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 28px; padding: 48px 32px;
}
#fo.on { display: flex; }
#fo.m0 { background: var(--n); }
#fo.m1 { animation: fo-redden 300s linear both; }
#fo.m1 #fo-wbt { color: #101010; }
#fo.m1 #fo-cd { color: #101010; }
#fo.m1 .fo-btn { color: #101010; border-color: rgba(0,0,0,.28); }
#fo.m1 .fo-btn:hover { background: rgba(0,0,0,.08); color: #101010; border-color: rgba(0,0,0,.45); }
#fo.m1 #fo-hint { color: rgba(0,0,0,.75); }
#fo.m1 #fo-form { background: rgba(255,255,255,.9); }
#fo.m1 #fo-form .ef-entry-item { color: rgba(0,0,0,.85); border-bottom-color: rgba(0,0,0,.15); }
#fo.m1 #fo-form .ef-del { color: rgba(0,0,0,.4); }
#fo.m1 #fo-form .ef-del:hover { color: #101010; }
#fo.m1 #fo-form input.wi { color: rgba(0,0,0,.9); border-bottom-color: rgba(0,0,0,.3); }
#fo.m1 #fo-form input.wi::placeholder { color: rgba(0,0,0,.4); }
#fo.m1 #fo-form input.wi:focus { border-bottom-color: rgba(0,0,0,.55); background: rgba(0,0,0,.04); }
#fo.m1 #fo-form .ef-add { color: rgba(0,0,0,.9); border-color: rgba(0,0,0,.3); }
#fo.m1 #fo-form .ef-add:hover { background: rgba(0,0,0,.08); color: #101010; }
#fo.m1 .fo-intent-row { color: rgba(0,0,0,.85); border-bottom-color: rgba(0,0,0,.1); }
#fo.m1 .fo-intent-plan { color: rgba(0,0,0,.6); }
@keyframes fo-redden { from { background: rgba(253,231,37,.92); } to { background: var(--r); } }
#fo-wbt { font-size: 12px; font-weight: 600; color: #fff; letter-spacing:.06em; text-transform: lowercase; }
#fo-cd  { font-size: 96px; font-weight: 700; font-family: var(--f); color: #fff; font-variant-numeric: tabular-nums; letter-spacing: .08em; line-height: 1; }
#fo-btns { display: flex; gap: 10px; }
.fo-btn { padding: 5px 18px; border-radius: 999px; border: 1px solid rgba(255,255,255,.35); background: transparent; color: rgba(255,255,255,.8); font: 600 11px var(--f); cursor: pointer; transition: all .12s; }
.fo-btn:hover { background: rgba(255,255,255,.15); color: #fff; border-color: rgba(255,255,255,.7); }
#fo-form { width: 100%; max-width: 480px; background: rgba(255,255,255,.1); border-radius: 10px; padding: 14px 16px; }
#fo-form .ef-list { margin-bottom: 8px; }
#fo-form .ef-entry-item { color: rgba(255,255,255,.9); border-bottom-color: rgba(255,255,255,.12); }
#fo-form .ef-check { border-color: rgba(255,255,255,.35); background: none; }
#fo-form .ef-check[data-col=w] { background: var(--w); border: none; }
#fo-form .ef-check[data-col=r] { background: var(--r); border: none; }
#fo-form .ef-check[data-col=y] { background: var(--y); border: none; color: rgba(0,0,0,.6); }
#fo-form .ef-check[data-col=l] { background: var(--l); border: none; }
#fo-hint { display: none; font-size: 13px; font-weight: 500; color: rgba(255,255,255,.55); letter-spacing: .06em; text-align: center; max-width: 320px; line-height: 1.7; }
#fo.m1 #fo-hint { display: block; }
#fo-form .ef-del { color: rgba(255,255,255,.3); }
#fo-form .ef-del:hover { color: rgba(255,255,255,.9); }
#fo-form .ef-row { gap: 8px; }
#fo-form input.wi { color: #fff; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,.25); border-radius: 0; padding: 2px 4px; font-size: 12px; }
#fo-form input.wi::placeholder { color: rgba(255,255,255,.3); }
#fo-form input.wi:focus { outline: none; border-bottom-color: rgba(255,255,255,.7); background: rgba(255,255,255,.06); }
#fo-form .ef-add { border-color: rgba(255,255,255,.35); color: rgba(255,255,255,.8); background: transparent; }
#fo-form .ef-add:hover { background: rgba(255,255,255,.15); color: #fff; }

/* ── Screen-reader utilities ── */
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

/* ── Day progress ── */
#day-progress { font-size: 10px; font-weight: 600; letter-spacing: .08em; color: var(--n40); padding: 3px 24px 8px; display: flex; gap: 8px; flex-basis: 100%; }

/* ── Focus overlay extras ── */
#fo.m2 { background: var(--n); }
#fo.m2 #fo-hint { display: block; }
#fo-intentions { margin-bottom: 14px; }
.fo-intent-row { display: flex; align-items: center; gap: 7px; padding: 3px 0; font-size: 13px; font-weight: 500; color: rgba(255,255,255,.85); border-bottom: 1px solid rgba(255,255,255,.1); }
.fo-intent-plan { font-size: 12px; font-style: italic; color: rgba(255,255,255,.5); margin-bottom: 8px; }

/* ── Block intention input ── */
input.block-intention { display: block; width: 100%; font-size: 11px; font-style: italic; color: var(--n); margin: 3px 0 8px; padding: 3px 8px; border: 1px solid var(--n08); border-radius: 4px; font-family: var(--f); background: transparent; }
input.block-intention::placeholder { color: var(--n40); }
input.block-intention:focus { outline: 1px solid var(--n20); background: #fff; }

/* ── Undo toast ── */
#undo-toast { display: none; position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: var(--n); color: #fff; padding: 9px 18px; border-radius: 999px; font: 600 12px var(--f); z-index: 400; gap: 10px; align-items: center; white-space: nowrap; }
#undo-toast.on { display: flex; }
#undo-btn { background: transparent; border: 1px solid rgba(255,255,255,.4); color: #fff; border-radius: 999px; padding: 2px 12px; font: 600 11px var(--f); cursor: pointer; }
#undo-btn:hover { background: rgba(255,255,255,.15); }

/* ── Task pool ── */
#pool-panel {
  display: none; flex-basis: 100%;
  padding: 8px 24px 12px; margin: 0 -24px;
  border-top: 1px solid var(--n08); background: #f9fafb;
}
#pool-panel.open { display: block; }
#pool-input-row { display: flex; gap: 8px; margin-bottom: 8px; }
#pool-input {
  flex: 1; border: 1px solid var(--n20); border-radius: 999px;
  padding: 4px 14px; font: 500 12px var(--f); color: var(--n); background: #fff;
}
#pool-input:focus { outline: 1.5px solid var(--n); border-color: var(--n); }
#pool-input::placeholder { color: var(--n40); }
#pool-pills { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; min-height: 24px; }
#pool-empty { font-size: 11px; color: var(--n40); font-style: italic; }
.pool-pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 8px 4px 12px; border: 1px dashed var(--n20); border-radius: 999px;
  background: #fff; color: var(--n); font: 500 12px/1 var(--f);
  cursor: pointer; max-width: 240px;
  transition: border-color .12s, background .12s, box-shadow .12s;
}
.pool-pill > span:not(.wb-mark) { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
.pool-pill:hover { border-style: solid; border-color: var(--n); background: #fff; box-shadow: 0 1px 4px var(--n08); }
.pool-pill:active { background: var(--n08); }
.pool-pill .ef-del { opacity: 0; transition: opacity .12s; flex-shrink: 0; }
.pool-pill:hover .ef-del { opacity: 1; }

/* ── Mobile ── */
@media (max-width: 680px) {
  #sidebar { display: none; }
  .wb { flex-direction: column; }
  .wbt { font-size: 12px; }
  .pill { width: 60px; height: 26px; font-size: 11px; }
  h1 { font-size: 17px; }
}

/* ── Dark Mode ── */
@media (prefers-color-scheme: dark) {
  html:not(.theme-light):not(.theme-dark) {
    --n:   #e0dcd0;
    --n40: rgba(224,220,208,.40);
    --n20: rgba(224,220,208,.20);
    --n08: rgba(224,220,208,.08);
  }

  html:not(.theme-light):not(.theme-dark) body {
    background: #121212;
    color: var(--n);
  }

  /* ── Header ── */
  html:not(.theme-light):not(.theme-dark) header {
    background: #121212;
    border-bottom-color: var(--n08);
  }
  html:not(.theme-light):not(.theme-dark) #wclock { color: var(--n40); }
  html:not(.theme-light):not(.theme-dark) .hbtns button {
    background: #1e1e1e;
    border-color: var(--n20);
    color: var(--n);
  }
  html:not(.theme-light):not(.theme-dark) .hbtns button:hover {
    background: var(--n);
    color: #121212;
    border-color: var(--n);
  }
  html:not(.theme-light):not(.theme-dark) #day-progress { color: var(--n40); }

  /* ── Banner ── */
  html:not(.theme-light):not(.theme-dark) #bnr {
    background: #1e1e1e;
    border-bottom-color: var(--n08);
    color: var(--n);
  }
  html:not(.theme-light):not(.theme-dark) #xbtn { color: var(--n40); }
  html:not(.theme-light):not(.theme-dark) #xbtn:hover { color: var(--n); }

  /* ── Sidebar ── */
  html:not(.theme-light):not(.theme-dark) #sidebar { background: #121212; }
  html:not(.theme-light):not(.theme-dark) .leg-title { color: var(--n40); }
  html:not(.theme-light):not(.theme-dark) .leg-item,

const pad  = n => String(n).padStart(2, '0');
const hm   = m => pad(Math.floor(m/60)%24) + ':' + pad(m%60);
const fmtd = s => s > 0 ? Math.floor(s/60) + ':' + pad(s%60) : '\u2014';
const fmtm = m => m >= 60 ? Math.floor(m/60)+'h'+(m%60?' '+m%60+'m':'') : m+'m';

function mkTimer(d, wbId) {
  const id = 't'+_ts++;
  const t  = { id, dur: d, elapsed: 0, state: 'idle', remFired: false, wbId };
  timerMap[id] = t; return t;
}
function mkWB(m, type) {
  const id = 'w'+_ws++;
  const wb = { id, type, sm: m, color: null, entries: [] };
  wb.t0 = mkTimer(600, id); wb.t1 = mkTimer(300, id);
  wbMap[id] = wb; return wb;
}
function buildDay() {
  blocks=[]; wbMap={}; timerMap={}; _ws=0; _ts=0;
  let m=420, hbn=0;
  while (m < 1740) {
    for (let h=0; h<2 && m<1740; h++) {
      hbn++;
      const sm=m, wbs=[];
      for (let j=0; j<4 && m<1740; j++) { wbs.push(mkWB(m, j===3?'buffer':'normal')); m+=15; }
      blocks.push({ type:'hour', num:hbn, sm, em:m, wbs });
    }
    if (m < 1740) {
      const sm=m, wbs=[];
      for (let j=0; j<2 && m<1740; j++) { wbs.push(mkWB(m,'pause')); m+=15; }
      blocks.push({ type:'pause', sm, em:m, wbs });
    }
  }
  // Load block intentions
  try { const ints=JSON.parse(localStorage.getItem('fiso3-int')||'{}'); blocks.forEach(blk=>{if(ints[blk.sm])blk.intention=ints[blk.sm];}); } catch {}
}

const saveT = t => ({ elapsed:t.elapsed, state:t.state==='running'?'paused':t.state, remFired:t.remFired });
function save() {
  const s = {};
  Object.values(wbMap).forEach(wb => {
    s[wb.id] = { color:wb.color, entries:wb.entries, t0:saveT(wb.t0), t1:saveT(wb.t1) };
  });
  try { localStorage.setItem(KEY, JSON.stringify(s)); } catch {}
}
function load() {
  try {
    const s = JSON.parse(localStorage.getItem(KEY) || '{}');
    Object.values(wbMap).forEach(wb => {
      const d = s[wb.id]; if (!d) return;
      wb.color=d.color||null; wb.entries=Array.isArray(d.entries)?d.entries:[];
      if (d.t0) Object.assign(wb.t0, d.t0);
      if (d.t1) Object.assign(wb.t1, d.t1);
    });
  } catch {}
}

const NARRATE_COOLDOWN = 45 * 60 * 1000;
let lastNarration = 0, narratorFlags = {}, narratorTimer = null, silentStreak = 0;

function maybeNarrate(trigger) {
  if (Date.now() - lastNarration < NARRATE_COOLDOWN) return;
  const quotes = narratorQuotes[trigger]; if (!quotes?.length) return;
  const q = quotes[Math.floor(Math.random() * quotes.length)];
  lastNarration = Date.now();
  clearTimeout(narratorTimer);
  $msg.textContent = q; $bnr.className = 'on narrator';
  narratorTimer = setTimeout(() => {
    $bnr.classList.add('fading');
    setTimeout(() => { if ($bnr.classList.contains('narrator')) $bnr.className = ''; }, 700);
  }, 8000);
}
function narrateForce(trigger) { lastNarration = 0; maybeNarrate(trigger); }

function onWBComplete(wb) {
  if (wb.type !== 'normal') return;
  const entries = wb.entries || [];
  const elapsed = (wb.t0.elapsed + wb.t1.elapsed) > 0;
  if (entries.length > 0 && entries.every(e => e.color)) {
    silentStreak = 0; maybeNarrate('allTagged');
  } else if (elapsed && entries.length === 0) {
    silentStreak++;
    if (silentStreak >= 3) { silentStreak = 0; maybeNarrate('silentTrilogy'); }
    else { maybeNarrate('untaggedElapsed'); }
  } else {
    silentStreak = 0;
  }
}

const getWB    = tid => { const t = timerMap[tid]; return t ? wbMap[t.wbId] : null; };
const isActive = wb  => wb.t0.state==='running' || wb.t1.state==='running';

function engineStart() { if (engine) return; engine = setInterval(globalTick, 1000); }
function engineStop()  { clearInterval(engine); engine = null; }

function globalTick() {
  tickN++;
  let any = false;
  Object.values(timerMap).forEach(t => {
    if (t.state !== 'running') return;
    any = true; t.elapsed++;
    const rem = t.dur - t.elapsed;
    if (!t.remFired && rem <= 60) {
      t.remFired = true;
      const wb = getWB(t.id);
      notify((wb?.label || (t.dur===600?'10-min':'5-min')+' timer') + ' \u2014 1 min remaining');
    }
    if (t.elapsed >= t.dur) {
      t.elapsed = t.dur; t.state = 'done';
      const wb = getWB(t.id);
      notify((wb?.label || (t.dur===600?'10-min':'5-min')+' timer') + ' complete');
      save(); syncDOM(t.id);
      // Auto-advance: 10-min done → auto-start 5-min
      if (wb && wb.t0.id === t.id && wb.t1.state === 'idle') {
        setTimeout(() => startTimer(wb.t1.id), 300);
      } else if (wb && wb.t1.id === t.id) {
        onWBComplete(wb); showTransition();
      } else { hideFocus(); }
      return;
    }
    const pill = document.getElementById('pill-'+t.id);
    if (pill) {
      pill.textContent = fmtd(rem);
      if (rem <= Math.floor(t.dur * .2)) pill.dataset.warn = 'true';
      else delete pill.dataset.warn;
    }
    const wb = getWB(t.id);
    const ae = document.getElementById('act-'+wb?.id);
    if (ae) { const te = wb.t0.elapsed + wb.t1.elapsed; ae.textContent = te > 0 ? fmtd(te) : '\u2014'; }
  });
  updateFocusCountdown();
  if (!any) engineStop();
  if (tickN % 10 === 0) { save(); updateSidebar(); }
}

function syncDOM(tid) {
  const t = timerMap[tid];
  const pill = document.getElementById('pill-'+tid); if (!pill) return;
  pill.dataset.s   = t.state;
  pill.textContent = pillTxt(t);
  delete pill.dataset.warn;
  // ARIA live announcement
  const ann = document.getElementById('timer-announce');
  if (ann) { const dl = t.dur===600?'10-minute':'5-minute'; const sl = {running:'started',paused:'paused',done:'complete'}[t.state]||''; ann.textContent = sl ? dl+' timer '+sl : ''; }

  const wb = getWB(tid); if (!wb) return;
  const card = document.getElementById('wb-'+wb.id);
  if (card) card.className = 'wb' + (isActive(wb) ? ' act' : '');
  const ae = document.getElementById('act-'+wb.id);
  if (ae) { const te = wb.t0.elapsed + wb.t1.elapsed; ae.textContent = te > 0 ? fmtd(te) : '\u2014'; }
  updateSidebar();
  updateDayProgress();
}

function toggleTimer(tid) {
  const t = timerMap[tid]; if (!t || t.state === 'done') return;
  t.state === 'running' ? pauseTimer(tid) : startTimer(tid);
}
function startTimer(tid) {
  const t = timerMap[tid]; if (!t || t.state === 'done') return;
  if (Notification.permission === 'default') Notification.requestPermission();
  t.state = 'running'; save(); syncDOM(tid); engineStart();
  if (!narratorFlags.firstTimer) { narratorFlags.firstTimer = true; narrateForce('firstTimer'); }
  focusTriggerEl = document.getElementById('pill-'+tid);
  if (focusTriggerEl) focusTriggerEl.dataset.s = 'pending';
  const wb = getWB(tid); if (wb) showFocus(wb, t);
}
function pauseTimer(tid) {
  const t = timerMap[tid]; if (!t || t.state !== 'running') return;
  if (focusDelayTimer) { clearTimeout(focusDelayTimer); focusDelayTimer = null; }
  t.state = 'paused'; save(); syncDOM(tid);
  if (Object.values(timerMap).every(t => t.state !== 'running')) engineStop();
  hideFocus();
}
function endTimer(tid) {
  const t = timerMap[tid]; if (!t || t.state === 'done') return;
  t.state = 'done'; save(); syncDOM(tid);
  if (Object.values(timerMap).every(t => t.state !== 'running')) engineStop();
  hideFocus();
  const wb2 = getWB(tid); if (wb2 && wb2.t1.id === tid) onWBComplete(wb2);
}

function focusKeyHandler(ev) {
  if (ev.key !== 'Escape') return;
  ev.preventDefault();
  const t = focusTid ? timerMap[focusTid] : null;
  if (t && t.state === 'running') pauseTimer(focusTid);
  else hideFocus();
}

function _renderFocus(wb, t) {

  if (parentBlk && parentBlk.intention) {
    const pl = document.createElement('div'); pl.className = 'fo-intent-plan';
    pl.textContent = 'plan: ' + parentBlk.intention; ff.appendChild(pl);
  }
  const listEl = document.createElement('div'); listEl.className = 'ef-list'; listEl.id = 'fo-ef-list';
  renderFormEntries(wb, listEl); ff.appendChild(listEl);
  const row = document.createElement('div'); row.className = 'ef-row';
  const ci = document.createElement('input'); ci.className = 'wi ef-client'; ci.placeholder = 'who or what';
  const ni = document.createElement('input'); ni.className = 'wi ef-notes'; ni.placeholder = 'details, if you must';
  const ti = document.createElement('input'); ti.className = 'wi ef-est'; ti.placeholder = 'how long';
  const ab = document.createElement('button'); ab.className = 'ef-add'; ab.textContent = 'log it';
  ab.onclick = () => {
    const e = { id:'n'+Date.now(), client:ci.value.trim(), notes:ni.value.trim(), est:ti.value.trim(), color:null };
    if (!e.client && !e.notes && !e.est) return;
    wb.entries.push(e); save();
    ci.value=''; ni.value=''; ti.value=''; ci.focus();
    renderEntries(wb);
    renderFormEntries(wb, listEl);
    const ie = document.getElementById('fo-intentions');
    if (ie) { ie.innerHTML=''; wb.entries.forEach(e2=>{ const r2=document.createElement('div');r2.className='fo-intent-row';const d2=document.createElement('span');d2.className='wb-mark';if(e2.color){d2.dataset.col=e2.color;d2.textContent=ltr[e2.color]||'';}const t2=document.createElement('span');t2.textContent=[e2.client,e2.est,e2.notes].filter(Boolean).join(' \u00b7 ');r2.append(d2,t2);ie.appendChild(r2);}); }
    const ml = document.getElementById('ef-list-'+wb.id); if (ml) renderFormEntries(wb, ml);
    updateSidebar();
  };
  [ci,ni,ti].forEach(inp => { inp.onkeydown = ev => { if(ev.key==='Enter'){ev.preventDefault();ab.click();} }; });
  row.append(ci,ni,ti,ab); ff.appendChild(row);
  setTimeout(() => document.getElementById('fo-pause-btn')?.focus(), 100);
}

function hideFocus() {
  if (focusDelayTimer) { clearTimeout(focusDelayTimer); focusDelayTimer = null; }
  document.removeEventListener('keydown', focusKeyHandler);

  fo.className = ''; fo.style.animationDelay = ''; fo.onclick = null;

  wb.color = first ? first.color : null;

// Parse est. field — accepts: "10" "10'" "10'30" "10'30''"
function parseEst(s) {
  if (!s) return 0;
  s = s.trim().replace(/[\u2019\u2032]/g, "'");
  const cm = s.match(/^(\d+):(\d+)/);
  if (cm) return parseInt(cm[1]) * 60 + parseInt(cm[2]);
  const ms = s.match(/^(\d+)'(\d+)/);
  if (ms) return parseInt(ms[1]) * 60 + parseInt(ms[2]);
  const m = s.match(/^(\d+)/);
  return m ? parseInt(m[1]) * 60 : 0;
}

// ── Day progress ────────────────────────────────────────
function updateDayProgress() {
  const total = Object.keys(wbMap).length;
  const active = Object.values(wbMap).filter(wb => wb.t0.elapsed > 0 || wb.t1.elapsed > 0).length;
  let totalSec = 0;
  Object.values(timerMap).forEach(t => { totalSec += t.elapsed; });
  const h = Math.floor(totalSec / 3600), m = Math.floor((totalSec % 3600) / 60);
  const dpb = document.getElementById('dp-blocks');
  if (dpb) {
    const defaultText = 'Block '+active+' of '+total;
    const altText = ['Seven', 'Thirty-two', 'one hour forty-five minutes in the timeline'][Math.floor(Math.random()*3)]; // Placeholder, will be replaced dynamically
    dpb.dataset.default = defaultText;
    dpb.textContent = defaultText;
    dpb.style.cursor = 'pointer';
    dpb.onclick = (e) => {
      e.stopPropagation();
      const words = (n) => {
        const ones = ['', 'one', 'two', 'three', 'four', 'five', 'six', 'seven', 'eight', 'nine'];
        const tens = ['', '', 'twenty', 'thirty', 'forty', 'fifty'];
        if (n < 10) return ones[n];
        if (n < 20) return ['ten', 'eleven', 'twelve', 'thirteen', 'fourteen', 'fifteen', 'sixteen', 'seventeen', 'eighteen', 'nineteen'][n-10];
        if (n < 100) return tens[Math.floor(n/10)] + (n%10 ? '-'+ones[n%10] : '');
        return n.toString();
      };
      if (dpb.textContent === defaultText) {
        const altVersion = words(active)+' of '+words(total)+' \u00b7 '+words(h)+' hour'+(h!==1?'s':'')+' '+words(m)+' minute'+(m!==1?'s':'')+' in the timeline';
        dpb.textContent = altVersion;
      } else {
        dpb.textContent = defaultText;
      }
    };
  }
  const dpe = document.getElementById('dp-elapsed'); if (dpe) dpe.textContent = totalSec > 0 ? (h>0?h+'h ':'')+m+'m elapsed' : '';
}

// ── Task pool ──────────────────────────────────────────────────────
const POOL_KEY = 'fiso3-pool';
let poolTasks = [], activeAssignmentTarget = null;

function loadPool() {
  try { poolTasks = JSON.parse(localStorage.getItem(POOL_KEY) || '[]'); }
  catch { poolTasks = []; }
}
function savePool() {
  try { localStorage.setItem(POOL_KEY, JSON.stringify(poolTasks)); } catch {}
}

function renderPool() {
  const container = document.getElementById('pool-pills');
  const emptyMsg  = document.getElementById('pool-empty');
  const toggle    = document.getElementById('pool-toggle');
  if (!container) return;
  container.innerHTML = '';
  const ltr = {w:'W', r:'D', y:'T', l:'L'};
  if (poolTasks.length === 0) {
    emptyMsg.style.display = 'block';
    if (toggle) toggle.textContent = 'Tasks';
    return;
  }
  emptyMsg.style.display = 'none';
  if (toggle) toggle.textContent = 'Tasks (' + poolTasks.length + ')';
  poolTasks.forEach(task => {
    const pill = document.createElement('button');
    pill.className = 'pool-pill';
    pill.setAttribute('aria-label', 'Assign: ' + task.text);
    if (task.color) {
      const dot = document.createElement('span'); dot.className = 'wb-mark';
      dot.dataset.col = task.color; dot.textContent = ltr[task.color] || '';
      dot.style.marginRight = '0'; pill.appendChild(dot);
    }
    const txt = document.createElement('span'); txt.textContent = task.text.charAt(0).toUpperCase() + task.text.slice(1);
    pill.appendChild(txt);
    const del = document.createElement('button'); del.className = 'ef-del';
    del.textContent = '\u00d7'; del.setAttribute('aria-label', 'Remove task');
    del.onclick = (ev) => {
      ev.stopPropagation();
      const removed = task;
      poolTasks = poolTasks.filter(t => t.id !== task.id);
      savePool(); renderPool();
      const toast = document.getElementById('undo-toast'); toast.className = 'on';
      document.querySelector('#undo-toast span').textContent = 'Task removed';
      clearTimeout(undoTimer);
      undoTimer = setTimeout(() => { toast.className = ''; }, 5000);
      document.getElementById('undo-btn').onclick = () => {
        poolTasks.push(removed); poolTasks.sort((a,b)=>a.createdAt-b.createdAt);
        savePool(); renderPool(); toast.className = ''; clearTimeout(undoTimer);
      };
    };
    pill.appendChild(del);
    pill.onclick = () => assignTaskFromPool(task);
    pill.oncontextmenu = (ev) => {
      ev.preventDefault();
      task.color = COLORS[(COLORS.indexOf(task.color||null)+1)%COLORS.length];
      savePool(); renderPool();
    };
    container.appendChild(pill);
  });
}

function addTaskToPool() {
  const input = document.getElementById('pool-input');
  const text = input.value.trim(); if (!text) return;
  poolTasks.push({ id:'p'+Date.now(), text, color:null, createdAt:Date.now() });
  savePool(); input.value=''; input.focus(); renderPool();
  document.getElementById('pool-panel').classList.add('open');
  document.getElementById('pool-toggle')?.setAttribute('aria-expanded','true');
}

function assignTaskFromPool(task) {
  if (!activeAssignmentTarget) {
    showBnr('Click a block\u2019s plan field or client field first, then click a task.');
    return;
  }
  const target = activeAssignmentTarget;
  if (target.type === 'intention') {
    target.blk.intention = task.text;
    try {
      const ints = JSON.parse(localStorage.getItem('fiso3-int')||'{}');
      ints[target.blk.sm] = task.text;
      localStorage.setItem('fiso3-int', JSON.stringify(ints));
    } catch {}
    const inp = document.querySelector('input.block-intention[data-sm="'+target.blk.sm+'"]');
    if (inp) inp.value = task.text;
  } else if (target.type === 'entry') {
    target.input.value = task.text; target.input.focus();
  }
  // Colour inheritance
  if (task.color) {
    const wb = target.type==='entry' ? target.wb : (target.blk?.wbs?.[0]||null);
    if (wb) {
      wb.color = task.color;
      const cs = document.getElementById('cs-'+wb.id);
      if (cs) cs.className = 'cs '+task.color;
      const cir = document.getElementById('cir-'+wb.id);
      if (cir) { cir.dataset.col = task.color; }
      save();
    }
  }
  poolTasks = poolTasks.filter(t => t.id !== task.id);
  savePool(); renderPool();
  const toast = document.getElementById('undo-toast'); toast.className = 'on';
  document.querySelector('#undo-toast span').textContent = 'Task assigned';
  clearTimeout(undoTimer);
  undoTimer = setTimeout(() => { toast.className=''; }, 5000);
  document.getElementById('undo-btn').onclick = () => {
    poolTasks.push(task); poolTasks.sort((a,b)=>a.createdAt-b.createdAt);
    savePool(); renderPool();
    if (target.type==='intention') {
      const inp = document.querySelector('input.block-intention[data-sm="'+target.blk.sm+'"]');
      if (inp) { inp.value=''; target.blk.intention=''; }
    } else if (target.type==='entry') { target.input.value=''; }
    toast.className=''; clearTimeout(undoTimer);
  };
}

document.getElementById('pool-toggle').onclick = () => {
  const panel = document.getElementById('pool-panel');
  const expanded = panel.classList.toggle('open');
  document.getElementById('pool-toggle').setAttribute('aria-expanded', String(expanded));
  if (expanded) document.getElementById('pool-input').focus();
};
document.getElementById('pool-add-btn').onclick = addTaskToPool;
document.getElementById('pool-input').onkeydown = (ev) => { if(ev.key==='Enter'){ev.preventDefault();addTaskToPool();} };

function renderDay() {
  const $day  = document.getElementById('day');  $day.innerHTML  = '';
  const $cbar = document.getElementById('cbar'); $cbar.innerHTML = '';

  blocks.forEach(blk => {
    const hd = document.createElement('div');
    hd.className = 'bh' + (blk.type==='pause' ? ' ph' : '');
    hd.textContent = blk.type==='hour'
      ? 'hour block '+blk.num+'  \u00b7  '+hm(blk.sm)+'\u2013'+hm(blk.em)
      : 'pause  \u00b7  '+hm(blk.sm)+'\u2013'+hm(blk.em);
    $day.appendChild(hd);
    if (blk.type==='hour') {
      const ii = document.createElement('input'); ii.className='wi block-intention';
      ii.placeholder='what\'s happening this hour\u2026'; ii.value=blk.intention||'';
      ii.dataset.sm = String(blk.sm);
      ii.onchange=()=>{ blk.intention=ii.value; try{const s=JSON.parse(localStorage.getItem('fiso3-int')||'{}');s[blk.sm]=ii.value;localStorage.setItem('fiso3-int',JSON.stringify(s));}catch{} };
      ii.onfocus=()=>{ activeAssignmentTarget={type:'intention',blk:blk}; if(poolTasks.length>0) document.getElementById('pool-panel').classList.add('open'); };
      ii.onblur=()=>{ setTimeout(()=>{ if(activeAssignmentTarget?.type==='intention') activeAssignmentTarget=null; },200); };
      $day.appendChild(ii);
    }

    blk.wbs.forEach(wb => {
      const cs = document.createElement('div');
      cs.id = 'cs-'+wb.id; cs.className = 'cs'+(wb.color?' '+wb.color:'');
      $cbar.appendChild(cs);

      const card = document.createElement('div');
      card.id = 'wb-'+wb.id; card.dataset.type = wb.type;
      card.className = 'wb'+(isActive(wb)?' act':'');

      // Left section
      const L = document.createElement('div'); L.className = 'wbl';

      // Time (+ 'buffer' label stacked below for buffer blocks)
      const tw = document.createElement('div'); tw.className = 'wbt-wrap';
      const wt = document.createElement('span'); wt.className = 'wbt'; wt.textContent = hm(wb.sm);
      tw.appendChild(wt);
      if (wb.type === 'buffer') {
        const bs = document.createElement('span'); bs.className = 'wbt-sub'; bs.textContent = 'buffer';
        tw.appendChild(bs);
      }
      L.appendChild(tw);


      // 10-min pill
      const p0 = document.createElement('button');
      p0.id = 'pill-'+wb.t0.id; p0.className = 'pill';
      p0.dataset.s = wb.t0.state; p0.textContent = pillTxt(wb.t0);
      p0.onclick = () => toggleTimer(wb.t0.id);
      // Hover text change for idle 10-min pill
      p0.addEventListener('mouseenter', function() {
        if (this.dataset.s === 'idle') {
          this.dataset.origText = this.textContent;
          this.textContent = 'go';
        }
      });
      p0.addEventListener('mouseleave', function() {
        if (this.dataset.origText) {
          this.textContent = this.dataset.origText;
          delete this.dataset.origText;
        }
      });
      L.appendChild(p0);

      // 5-min pill
      const p1 = document.createElement('button');
      p1.id = 'pill-'+wb.t1.id; p1.className = 'pill';
      p1.dataset.s = wb.t1.state; p1.textContent = pillTxt(wb.t1);
      p1.onclick = () => toggleTimer(wb.t1.id);
      // Hover text change for idle 5-min pill
      p1.addEventListener('mouseenter', function() {
        if (this.dataset.s === 'idle') {
          this.dataset.origText = this.textContent;
          this.textContent = 'ok';
        }
      });
      p1.addEventListener('mouseleave', function() {
        if (this.dataset.origText) {
          this.textContent = this.dataset.origText;
          delete this.dataset.origText;
        }
      });
      L.appendChild(p1);

      card.appendChild(L);

      // Right: elapsed + entry lines + plus button
      const R = document.createElement('div'); R.className = 'wbr';
      const te = wb.t0.elapsed + wb.t1.elapsed;
      const ae = document.createElement('span');
      ae.id = 'act-'+wb.id; ae.className = 'wa';
      ae.textContent = te > 0 ? fmtd(te) : '\u2014';
      const ec = document.createElement('div');
      ec.id = 'ec-'+wb.id; ec.className = 'wb-entries';
      renderEntries(wb, ec);
      const plusBtn = document.createElement('button');
      plusBtn.className = 'wb-plus'; plusBtn.title = 'Add entry';
      plusBtn.textContent = '+';
      plusBtn.onclick = () => toggleForm(wb.id);
      R.append(ae, ec, plusBtn);
      card.appendChild(R);
      $day.appendChild(card);
      $day.appendChild(buildForm(wb));
    });
  });
}

function renderEntries(wb, container) {
  if (!container) container = document.getElementById('ec-'+wb.id);
  if (!container) return;
  container.innerHTML = '';
  const ltr = {w:'W', r:'D', y:'T'};
  wb.entries.forEach(e => {
    if (!e.client && !e.est && !e.notes) return;
    const line = document.createElement('div');
    line.className = 'wb-entry-line';
    // Colour dot with letter
    const dot = document.createElement('span'); dot.className = 'wb-mark';
    if (e.color) { dot.dataset.col = e.color; dot.textContent = ltr[e.color] || ''; }
    line.appendChild(dot);
    // Bold client
    if (e.client) {
      const b = document.createElement('b'); b.textContent = e.client;
      line.appendChild(b);
    }
    // Est + notes
    const rest = [];
    if (e.est) rest.push(e.est.trim());
    if (e.notes) rest.push(e.notes);
    if (rest.length) {
      const sep = e.client ? ' \u00b7 ' : '';
      line.appendChild(document.createTextNode(sep + rest.join(' \u00b7 ')));
    }
    container.appendChild(line);
  });
}

function renderFormEntries(wb, el) {
  if (!el) return;
  el.innerHTML = '';
  const ltr = {w:'W', r:'D', y:'T'};
  wb.entries.forEach(e => {
    const item = document.createElement('div'); item.className = 'ef-entry-item';
    // Colour-cycling circle with letter
    const chk = document.createElement('button'); chk.className = 'ef-check';
    if (e.color) { chk.dataset.col = e.color; chk.textContent = ltr[e.color] || ''; }
    chk.setAttribute('aria-label', 'Cycle tag colour');
    chk.onclick = () => cycleEntryColor(wb, e, el);
    const parts = [e.client, e.est, e.notes].filter(Boolean);
    const txt = document.createElement('span'); txt.textContent = parts.join(' \u00b7 ');
    const del = document.createElement('button'); del.className = 'ef-del'; del.textContent = '\u00d7';
    del.setAttribute('aria-label', 'Delete entry');
    del.onclick = () => {
      const removed = wb.entries.find(x => x.id === e.id);
      wb.entries = wb.entries.filter(x => x.id !== e.id);
      const first = wb.entries.find(en => en.color);
      wb.color = first ? first.color : null;
      const cs = document.getElementById('cs-'+wb.id);
      if (cs) cs.className = 'cs'+(wb.color ? ' '+wb.color : '');
      save(); renderEntries(wb); renderFormEntries(wb, el); updateSidebar();
      if (removed) showUndoToast(wb, removed, el);
    };
    item.append(chk, txt, del); el.appendChild(item);
  });
}

function buildForm(wb) {
  const form = document.createElement('div');
  form.id = 'form-'+wb.id; form.className = 'wb-form';
  const el = document.createElement('div');
  el.id = 'ef-list-'+wb.id; el.className = 'ef-list';
  renderFormEntries(wb, el);
  form.appendChild(el);
  const row = document.createElement('div'); row.className = 'ef-row';
  const ci = document.createElement('input'); ci.className = 'wi ef-client'; ci.placeholder = 'who or what';
  ci.onfocus = () => { activeAssignmentTarget={type:'entry',wb:wb,input:ci}; if(poolTasks.length>0) document.getElementById('pool-panel').classList.add('open'); };
  const ni = document.createElement('input'); ni.className = 'wi ef-notes'; ni.placeholder = 'details, if you must';
  const ti = document.createElement('input'); ti.className = 'wi ef-est';   ti.placeholder = 'how long';
  const addBtn = document.createElement('button'); addBtn.className = 'ef-add'; addBtn.textContent = 'log it';
  addBtn.onclick = () => {
    const entry = { id: 'n'+Date.now(), client: ci.value.trim(), notes: ni.value.trim(), est: ti.value.trim(), color: null };
    if (!entry.client && !entry.notes && !entry.est) return;
    wb.entries.push(entry); save();
    ci.value = ''; ni.value = ''; ti.value = ''; ci.focus();
    renderEntries(wb);
    renderFormEntries(wb, el);
    updateSidebar();
  };
  [ci, ni, ti].forEach(inp => {
    inp.onkeydown = ev => { if (ev.key === 'Enter') { ev.preventDefault(); addBtn.click(); } };
  });
  row.append(ci, ni, ti, addBtn);
  form.appendChild(row);
  return form;
}

let openFormId = null;
function toggleForm(wbId) {
  const form = document.getElementById('form-'+wbId);
  if (!form) return;
  if (openFormId && openFormId !== wbId) {
    const prev = document.getElementById('form-'+openFormId);
    if (prev) prev.classList.remove('open');
  }
  const isOpen = form.classList.toggle('open');
  openFormId = isOpen ? wbId : null;
  if (isOpen) setTimeout(() => form.querySelector('.ef-client')?.focus(), 50);
}

document.getElementById('btn-rev').onclick = () => {
  revQ = Object.values(wbMap)
    .filter(wb => (wb.t0.elapsed>0||wb.t1.elapsed>0) && wb.entries.length===0)
    .map(wb => wb.id);
  revP = 0;
  if (!revQ.length) { showBnr('Nothing to review. Every block accounted for.'); return; }
  nextRev();
};
function nextRev() {
  if (revP >= revQ.length) { showBnr('Review done. The record is as complete as it\'s going to be.'); revQ = []; return; }
  const id = revQ[revP++];
  const el = document.getElementById('wb-'+id);
  if (el) { el.scrollIntoView({ behavior:'smooth', block:'center' }); setTimeout(()=>{ const f=document.getElementById('form-'+id); if(f){f.classList.add('open');openFormId=id;} f?.querySelector('.ef-client')?.focus(); }, 350); }
}

document.getElementById('btn-rst').onclick = () => {
  if (!confirm('Reset everything? The day will be... unwritten.')) return;
  lastNarration = 0; maybeNarrate('reset'); narratorFlags = {}; silentStreak = 0;
  engineStop(); localStorage.removeItem(KEY);
  buildDay(); renderDay(); document.getElementById('sum').className = '';
};

function tallies() {
  const work = {w:0,r:0,y:0,l:0,none:0}, buf = {w:0,r:0,y:0,l:0,none:0}, names = {};
  Object.values(wbMap).forEach(wb => {
    const e = wb.t0.elapsed + wb.t1.elapsed; if (!e) return;
    const m = Math.round(e/60);
    if (wb.type==='normal') { work[wb.color||'none']+=m; wb.entries.forEach(e=>{ if(e.client){ const min=parseEst(e.est)/60; names[e.client]=(names[e.client]||0)+(min>0?min:0); }}); }
    else if (wb.type==='buffer') { buf[wb.color||'none']+=m; }
  });
  return { work, buf, names };
}

document.getElementById('btn-sum').onclick = () => {
  const { work, buf, names } = tallies();
  const $b = document.getElementById('sbody'); $b.innerHTML = '';

      const row = document.createElement('div'); row.className = 'sr';
      row.innerHTML = '<span class="sd '+c+'"></span><span class="sl">'+l+'</span><span class="st">'+fmtm(buf[c])+'</span>';
      $b.appendChild(row);
    });

  const ns = Object.entries(names).sort((a,b) => b[1]-a[1]);
  if (ns.length) {
    const nh = document.createElement('div'); nh.className = 'sbh'; nh.textContent = 'By label'; $b.appendChild(nh);
    ns.forEach(([n,m]) => {
      const row = document.createElement('div'); row.className = 'sr';
      row.innerHTML = '<span class="sd"></span><span class="sl">'+n+'</span><span class="st">'+fmtm(m)+'</span>';
      $b.appendChild(row);
    });
  }
  document.getElementById('sum').className = 'on';
  document.getElementById('sum').scrollIntoView({ behavior:'smooth' });
};

document.getElementById('btn-csv').onclick = () => {
  const rows = ['time,type,colour,client,notes,est,actual_min'];
  Object.values(wbMap).forEach(wb => {
    const elapsed = wb.t0.elapsed + wb.t1.elapsed;
    if (!elapsed && wb.t0.state==='idle' && wb.t1.state==='idle') return;
    const am = parseFloat((elapsed/60).toFixed(1));
    const ts = '"'+hm(wb.sm)+'\u2013'+hm(wb.sm+15)+'"';
    if (wb.entries.length === 0) {
      rows.push([ts,'"'+wb.type+'"','"'+(wb.color||'')+'"','""','""','""','"'+am+'"'].join(','));
    } else {
      wb.entries.forEach(e => {
        rows.push([ts,'"'+wb.type+'"','"'+(wb.color||'')+'"',
          '"'+(e.client||'').replace(/"/g,'""')+'"',
          '"'+(e.notes||'').replace(/"/g,'""')+'"',
          '"'+(e.est||'')+'"','"'+am+'"'].join(','));
      });
    }
  });
  const url = URL.createObjectURL(new Blob([rows.join('\n')],{type:'text/csv'}));
  Object.assign(document.createElement('a'),{href:url,download:'feudalism.csv'}).click();
  URL.revokeObjectURL(url);
};

document.getElementById('btn-cpy').onclick = () => {
  const { work, names } = tallies();
  const L = ['feudalism is so out \u2014 day summary'];
  [['w','Normie work'],['r','Discussions'],['y','Testing'],['l','Lore'],['none','Untagged']]
    .forEach(([c,l]) => { if (work[c]) L.push(l+': '+fmtm(work[c])); });
  const ns = Object.entries(names).sort((a,b)=>b[1]-a[1]);
  if (ns.length) { L.push(''); ns.forEach(([n,m]) => L.push(n+': '+fmtm(m))); }
  navigator.clipboard.writeText(L.join('\n'))
    .then(() => showBnr('Summary copied. The clipboard is now slightly more interesting.'))
    .catch(() => showBnr('Copy didn\'t take. Try Export CSV \u2014 it\'s more reliable.'));
};

const THEME_KEY = 'fiso3-theme';
function getSavedTheme() {
  const value = localStorage.getItem(THEME_KEY);
  return value === 'dark' || value === 'light' ? value : null;
}
function updateThemeButton(theme) {
  const btn = document.getElementById('theme-toggle');
  if (!btn) return;
  btn.textContent = theme === 'dark' ? '☀ Light' : '☾ Dark';
  btn.setAttribute('aria-label', 'Switch to ' + (theme === 'dark' ? 'light' : 'dark') + ' theme');
}
function applyTheme(theme) {
  const html = document.documentElement;
  html.classList.toggle('theme-dark', theme === 'dark');
  html.classList.toggle('theme-light', theme === 'light');
  updateThemeButton(theme);
}
function initTheme() {
  const stored = getSavedTheme();
  const theme = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  applyTheme(theme);
  const toggle = document.getElementById('theme-toggle');
  if (toggle) {
    toggle.onclick = () => {
      const next = document.documentElement.classList.contains('theme-dark') ? 'light' : 'dark';
      localStorage.setItem(THEME_KEY, next);
      applyTheme(next);
    };
  }
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
    if (getSavedTheme()) return;
    applyTheme(e.matches ? 'dark' : 'light');
  });
}

window.addEventListener('beforeunload', save);
initTheme();
